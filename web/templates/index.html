<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IoT Energy Prediction</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
    body {
        margin: 0;
        font-family: 'Poppins', sans-serif;
        background: linear-gradient(135deg, #4facfe, #00f2fe);
        height: 100vh;
        display: flex;
        flex-direction: column;
    }

    /* Navbar */
    .navbar {
        background: rgba(255,255,255,0.2);
        padding: 15px 30px;
        color: white;
        font-size: 20px;
        font-weight: 600;
        backdrop-filter: blur(10px);
    }

    /* Main container */
    .container {
        flex: 1;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    /* Card */
    .card {
        background: white;
        padding: 40px;
        border-radius: 20px;
        text-align: center;
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        width: 320px;
        animation: fadeIn 1s ease-in-out;
    }

    .card h2 {
        margin-bottom: 10px;
    }

    .card p {
        color: #666;
        font-size: 14px;
    }

    /* Button */
    .btn {
        margin-top: 20px;
        padding: 12px 25px;
        border: none;
        border-radius: 30px;
        background: linear-gradient(135deg, #4facfe, #00f2fe);
        color: white;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
    }

    .btn:hover {
        transform: scale(1.05);
        box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    }

    /* Footer */
    .footer {
        text-align: center;
        padding: 10px;
        color: white;
        font-size: 12px;
    }

    /* Animation */
    @keyframes fadeIn {
        from {opacity: 0; transform: translateY(20px);}
        to {opacity: 1; transform: translateY(0);}
    }
</style>
</head>

<body>

<div class="navbar">
    ⚡ Smart Energy Dashboard
</div>

<div class="container">
    <div class="card">
        <h2>IoT Energy Prediction</h2>
        <p>Predict your smart home energy usage using AI & IoT sensors.</p>

        <a href="/predict">
            <button class="btn">Predict Energy</button>
        </a>
    </div>
</div>

<div class="footer">
    © 2026 Smart IoT System
</div>

</body>
</html>
